name: "Tududi (Development)"
version: "1.0.0-dev.1"
slug: "tududi-dev"
description: "Development version of Tududi (v1.0.0-dev.1) - for testing only, may be unstable"
url: "https://github.com/c2gl/tududi-addon"
init: false
startup: services
boot: manual
arch:
  - amd64
ports:
  3002/tcp: 3002
ports_description:
  3002/tcp: "Web interface"
ingress: true
ingress_port: 3002
panel_icon: mdi:checkbox-marked-circle-outline
map:
  - config:rw
  - share:rw
  - addons:rw
  - backup:ro
options:
  # port is intentionally omitted here. It defaults to 3002 and must match
  # ingress_port and the ports mapping above. Changing it without also
  # changing those values will break ingress access. To override (advanced),
  # add port manually in the addon config.
  tududi_user_email: ""
  tududi_user_password: ""
  # tududi_session_secret is intentionally omitted here.
  # A cryptographically strong secret is auto-generated on first start
  # and persisted to /data/.session_secret so sessions survive restarts.
  # To override, add tududi_session_secret manually in the addon config.
  disable_telegram: false
  disable_scheduler: false
  upload_path: "/data/uploads"
  db_file: "/data/production.sqlite3"
schema:
  port: int?
  tududi_user_email: str
  tududi_user_password: str
  tududi_session_secret: str?
  disable_telegram: bool
  disable_scheduler: bool
  upload_path: str
  db_file: str
webui: "http://[HOST]:[PORT:3002]"
